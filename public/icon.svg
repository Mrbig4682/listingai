<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#6d28d9"/>
      <stop offset="100%" style="stop-color:#5b21b6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0.05)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  
  <!-- Subtle shine overlay -->
  <rect width="1024" height="1024" rx="224" fill="url(#shine)"/>
  
  <!-- AI sparkle elements -->
  <circle cx="200" cy="180" r="8" fill="rgba(255,255,255,0.4)"/>
  <circle cx="820" cy="200" r="6" fill="rgba(255,255,255,0.3)"/>
  <circle cx="180" cy="750" r="5" fill="rgba(255,255,255,0.25)"/>
  <circle cx="850" cy="780" r="7" fill="rgba(255,255,255,0.35)"/>
  
  <!-- Main 'L' letter -->
  <text x="280" y="680" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="520" font-weight="800" fill="white" letter-spacing="-20">L</text>
  
  <!-- AI indicator dot with glow -->
  <circle cx="680" cy="340" r="45" fill="url(#accent)" opacity="0.9"/>
  <circle cx="680" cy="340" r="25" fill="white" opacity="0.9"/>
  <circle cx="680" cy="340" r="12" fill="#7c3aed"/>
  
  <!-- Small sparkle lines around AI dot -->
  <line x1="680" y1="270" x2="680" y2="290" stroke="rgba(255,255,255,0.6)" stroke-width="4" stroke-linecap="round"/>
  <line x1="680" y1="390" x2="680" y2="410" stroke="rgba(255,255,255,0.6)" stroke-width="4" stroke-linecap="round"/>
  <line x1="610" y1="340" x2="630" y2="340" stroke="rgba(255,255,255,0.6)" stroke-width="4" stroke-linecap="round"/>
  <line x1="730" y1="340" x2="750" y2="340" stroke="rgba(255,255,255,0.6)" stroke-width="4" stroke-linecap="round"/>
</svg>