<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b21b6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Main title -->
  <text x="600" y="200" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="Arial, sans-serif">
    ListingAI
  </text>

  <!-- Subtitle -->
  <text x="600" y="280" font-size="48" fill="#e9d5ff" text-anchor="middle" font-family="Arial, sans-serif">
